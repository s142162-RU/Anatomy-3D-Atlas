<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الرياضيات • Math Challenge</title>
    
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    
    <!-- Unified Game Styles -->
    <link rel="stylesheet" href="game-style.css">
    
    <style>
        .equation-box {
            background: var(--game-bg-cell);
            border-radius: 40px;
            padding: 30px 20px;
            margin: 20px 0;
            border: 2px solid var(--game-border-medium);
            box-shadow: inset 0 4px 8px #000000, 0 8px 0 #0a111a;
        }
        
        .equation {
            font-size: 4rem;
            font-weight: 800;
            color: #fde68a;
            text-shadow: 0 4px 0 var(--game-primary-dark);
            letter-spacing: 8px;
        }
        
        .answer-btn {
            flex: 1;
            padding: 20px;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: inherit;
            box-shadow: 0 6px 0 #0a111a, 0 6px 10px black;
            border: 1px solid var(--game-border-medium);
        }
        
        .answer-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0a111a, 0 6px 10px black;
        }
        
        .answer-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        @media (max-width: 500px) {
            .equation {
                font-size: 3rem;
            }
            .answer-btn {
                font-size: 1.5rem;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Back button -->
        <a href="funpage.html" class="btn btn-outline-warning mb-3">← العودة للقائمة</a>
        
        <h1 class="game-title">⚡ ماتش⚡</h1>
        <p class="game-subtitle">تحدي الرياضيات السريع</p>
        
        <!-- Level -->
        <div class="level-badge mb-3" id="levelDisplay">المستوى ١</div>
        
        <!-- Stats -->
        <div class="row g-3 mb-3">
            <div class="col-6">
                <div class="stat-card text-center">
                    <div class="stat-label">النقاط</div>
                    <div class="stat-value" id="scoreDisplay">0</div>
                </div>
            </div>
            <div class="col-6">
                <div class="stat-card text-center">
                    <div class="stat-label">أعلى نتيجة</div>
                    <div class="stat-value" id="highScoreDisplay">0</div>
                </div>
            </div>
        </div>
        
        <!-- Timer -->
        <div class="timer-container mb-3">
            <div class="timer-text text-center" id="timerDisplay">5</div>
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill"></div>
            </div>
        </div>
        
        <!-- Equation -->
        <div class="equation-box">
            <div class="equation text-center" id="equationDisplay">5 + 3 = 8</div>
        </div>
        
        <!-- Answer buttons -->
        <div class="d-flex gap-3 mb-3">
            <button class="answer-btn btn-success" id="trueBtn">✅ صحيح</button>
            <button class="answer-btn btn-danger" id="falseBtn">❌ خطأ</button>
        </div>
        
        <!-- Message -->
        <div class="game-message" id="messageBox">اضغط صحيح أو خطأ</div>
        
        <!-- Controls -->
        <div class="d-flex justify-content-center">
            <button class="btn-game" id="newGameBtn">🔄 لعبة جديدة</button>
        </div>
    </div>
    
    <script>
        (function(){
            "use strict";

            let score = 0;
            let highScore = localStorage.getItem('mathHighScore') || 0;
            let level = 1;
            let currentEquation = { text: '', isCorrect: true };
            let timer = 5;
            let maxTime = 5;
            let timerInterval = null;
            let gameActive = false;
            let canAnswer = false;

            const levelEl = document.getElementById('levelDisplay');
            const scoreEl = document.getElementById('scoreDisplay');
            const highScoreEl = document.getElementById('highScoreDisplay');
            const timerEl = document.getElementById('timerDisplay');
            const timerFill = document.getElementById('timerFill');
            const equationEl = document.getElementById('equationDisplay');
            const messageEl = document.getElementById('messageBox');
            const trueBtn = document.getElementById('trueBtn');
            const falseBtn = document.getElementById('falseBtn');

            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function generateEquation() {
                const ops = ['+', '-', '*'];
                let num1, num2, result, op;
                let makeCorrect = Math.random() > 0.4;
                
                const maxNum = Math.min(10 + level * 2, 50);
                
                switch(level) {
                    case 1:
                        op = '+';
                        num1 = randomInt(1, maxNum);
                        num2 = randomInt(1, maxNum);
                        result = num1 + num2;
                        break;
                    case 2:
                        op = ops[randomInt(0, 1)];
                        num1 = randomInt(1, maxNum);
                        num2 = randomInt(1, maxNum);
                        result = op === '+' ? num1 + num2 : num1 - num2;
                        break;
                    default:
                        op = ops[randomInt(0, 2)];
                        num1 = randomInt(1, maxNum);
                        num2 = randomInt(1, op === '*' ? 10 : maxNum);
                        
                        if (op === '+') result = num1 + num2;
                        else if (op === '-') result = num1 - num2;
                        else result = num1 * num2;
                }
                
                let displayResult = result;
                if (!makeCorrect) {
                    const offset = randomInt(1, Math.max(2, Math.floor(result * 0.2)));
                    displayResult = Math.random() > 0.5 ? result + offset : result - offset;
                }
                
                const opSymbol = op === '*' ? '×' : op;
                const text = `${num1} ${opSymbol} ${num2} = ${displayResult}`;
                
                return { text, isCorrect: (displayResult === result) };
            }

            function loadNewEquation() {
                currentEquation = generateEquation();
                equationEl.textContent = currentEquation.text;
            }

            function startTimer() {
                timer = maxTime;
                timerEl.textContent = timer;
                timerFill.style.width = '100%';
                
                if (timerInterval) clearInterval(timerInterval);
                
                timerInterval = setInterval(() => {
                    timer -= 0.1;
                    timer = Math.max(0, timer);
                    timerEl.textContent = Math.ceil(timer);
                    timerFill.style.width = `${(timer / maxTime) * 100}%`;
                    
                    if (timer <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        canAnswer = false;
                        
                        score = Math.max(0, score - 5);
                        updateScore();
                        
                        messageEl.textContent = '⏰ انتهى الوقت! -٥ نقاط';
                        
                        setTimeout(() => {
                            if (gameActive) nextQuestion();
                        }, 1000);
                    }
                }, 100);
            }

            function nextQuestion() {
                if (!gameActive) return;
                
                const newLevel = Math.floor(score / 50) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    maxTime = Math.max(3, 5 - Math.floor(level / 3));
                    levelEl.textContent = `المستوى ${level}`;
                    messageEl.textContent = `🎯 ارتقيت للمستوى ${level}!`;
                }
                
                loadNewEquation();
                canAnswer = true;
                trueBtn.disabled = false;
                falseBtn.disabled = false;
                startTimer();
            }

            function updateScore() {
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('mathHighScore', highScore);
                }
            }

            function handleAnswer(userSaysCorrect) {
                if (!gameActive || !canAnswer) return;
                
                canAnswer = false;
                trueBtn.disabled = true;
                falseBtn.disabled = true;
                
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                
                const isCorrect = (userSaysCorrect === currentEquation.isCorrect);
                
                if (isCorrect) {
                    score += 10;
                    messageEl.textContent = '✅ صحيح! +١٠ نقاط';
                } else {
                    score = Math.max(0, score - 5);
                    messageEl.textContent = `❌ خطأ! -٥ نقاط (الإجابة ${currentEquation.isCorrect ? 'صحيحة' : 'خاطئة'})`;
                }
                
                updateScore();
                
                setTimeout(() => {
                    if (gameActive) nextQuestion();
                }, 800);
            }

            function startNewGame() {
                gameActive = true;
                score = 0;
                level = 1;
                maxTime = 5;
                
                highScore = localStorage.getItem('mathHighScore') || 0;
                
                scoreEl.textContent = '0';
                highScoreEl.textContent = highScore;
                levelEl.textContent = 'المستوى ١';
                messageEl.textContent = 'انطلق!';
                
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                
                nextQuestion();
            }

            highScoreEl.textContent = highScore;
            
            trueBtn.addEventListener('click', () => handleAnswer(true));
            falseBtn.addEventListener('click', () => handleAnswer(false));
            document.getElementById('newGameBtn').addEventListener('click', startNewGame);
            
            startNewGame();
        })();
    </script>
</body>
</html>
