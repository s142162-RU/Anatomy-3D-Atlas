<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب - Anatomy 3D</title>
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="auth-card reverse">
        <div class="form-side">
            <img src="Logo.png" class="logo" alt="Logo">
            <h1>إنشاء حساب</h1>
            <div class="google-btn">
                <img src="https://www.svgrepo.com/svg/327365/logo-google" alt="G">
                <span>التسجيل عبر جوجل</span>
            </div>
            <p class="separator">أو استخدم بريدك الإلكتروني</p>
            <form>
                <input type="text" placeholder="الاسم الكامل" required>
                <input type="email" placeholder="البريد الإلكتروني" required>
                <input type="password" placeholder="كلمة المرور" required>
                <button type="submit" class="submit-btn">الإنضمام الآن</button>
            </form>
        </div>

        <div class="image-side side-bg">
            <div class="overlay-content">
                <h2>مرحباً بك!</h2>
                <p>أدخل بياناتك الشخصية وابدأ استكشاف التطبيق</p>
                <a href="login.html" class="switch-btn">تسجيل الدخول</a>
            </div>
        </div>
    </div>
</body>
</html>
