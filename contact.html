<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy Atlas | تواصل معنا</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* make content wider but still centered */
    .container-wide {    
        max-width: 1000px;
        margin: 0 auto;
        padding: 140px 20px 80px;
        text-align: center;
    }

    /* table style (dark theme) */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background-color: var(--card-bg);
        border-radius: 10px;
        overflow: hidden;
    }


    th, td {
        padding: 12px;
        border: 1px solid #1e293b;
        font-size: 0.9rem;
    }

    th {
        background-color: #0f172a;
        color: var(--accent-blue);
    }

    tr:hover {
        background-color: var(--input-bg);
    }
    /* team section */
    .team-container {
        display: flex;
        justify-content: center;
        gap: 25px;
        flex-wrap: wrap;
        margin-top: 40px;
    }

    /* team card */
    .team-card {
        background-color: var(--card-bg);
        padding: 20px;
        border-radius: 20px;
        width: 200px;
        text-align: center;
        border: 1px solid #1e293b;
        transition: 0.3s;
    }
    .team-card:hover {
        transform: translateY(-5px);   
        box-shadow: 0 0 20px var(--accent-glow);
    }
    
    /* profile image */
    .team-card img {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 10px;
    }

    /* text */
    .team-card h4 {
        margin: 10px 0 5px;
    }

    .team-card p {
        font-size: 0.85rem;
        color: var(--sub-text);
    }



    </style>




</head>
<body>
<div class="header-wrapper">

</div>

 <div class="container">
    <h1>تواصل معنا</h1>
    
    <form action="https://httpbin.org/get" method="GET">
        
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" name="full_name" placeholder="ادخل اسمك هنا" required>
        </div>

        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" name="user_email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label>رسالتك</label>
            <textarea name="user_message" placeholder="كيف يمكننا مساعدتك؟" required></textarea>
        </div>


        <button type="submit" class="main-btn">إرسال الرسالة</button>
    </form>

        <p style="color: var(--sub-text); margin-top: 20px; font-size: 0.8rem;">
            سيتم توجيهك لصفحة النتائج عند الضغط على إرسال.
        </p>
    </div>

    </div>
