<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy Atlas | استبيان</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.form-card {
    background: #000;
    border-radius: 20px;
    padding: 30px;
    border: 1px solid #1e293b;
    box-shadow: 0 0 20px rgba(0,212,255,0.15);
    max-width: 700px;
    margin: auto;
}


.form-label-custom {
    color: #cbd5e1;
    font-size: 0.9rem;
    margin-bottom: 6px;
    display: block;
}

.form-control-custom {
    width: 100%;
    padding: 12px;
    background: #161f2e;
    border: 1px solid #1e293b;
    border-radius: 10px;
    color: white;
    outline: none;
}

.form-control-custom:focus {
    border-color: #00d4ff;
}

.form-check-custom {
    margin-left: 15px;
    color: #e2e8f0;
    font-size: 0.9rem;
}

.range-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

.range-value {
    width: 60px;
    text-align: center;
    background: #161f2e;
    border: 1px solid #1e293b;
    border-radius: 8px;
    color: white;
}

input[type="range"] {
    flex: 1;
    appearance: none;
    height: 6px;
    background: #00d4ff;
    border-radius: 10px;
}

input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 16px;
    height: 16px;
    background: #00d4ff;
    border-radius: 50%;
    cursor: pointer;
}

.submit-btn {
    width: 100%;
    padding: 14px;
    background: #00d4ff;
    color: black;
    border: none;
    border-radius: 25px;
    font-weight: bold;
    margin-top: 15px;
    transition: 0.3s;
}

.submit-btn:hover {
    transform: scale(1.03);
}

.custom-range-wrapper {
    position: relative;
    width: 100%;
    height: 8px;
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
}

.range-fill {
    position: absolute;
    height: 100%;
    width: 50%;
    background: #00d4ff;
    border-radius: 10px;
    transition: width 0.1s linear;
    box-shadow: 0 0 10px #00d4ff;
}

.custom-range-wrapper input[type="range"] {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
}

.range-value {
    width: 80px;
    text-align: center;
    background: #161f2e;
    border: 1px solid #1e293b;
    border-radius: 8px;
    color: white;
}

</style>
</head>

<body>

<div class="header-wrapper">
    <div class="header">
       
        <div class="navbar right-nav">
            <a href="index.html">الرئيسية</a>

            <div class="dropdown">
                <a href="#" class="dropbtn">الأطلس الحيوي</a>
                <div class="dropdown-content">
                    <a href="skeletal.html">الهيكل العظمي</a>
                    <a href="muscular.html">الجهاز العضلي</a>
                    <a href="circulatory.html">الجهاز الدوري</a>
                    <a href="digestive.html">الجهاز الهضمي</a>
                    <a href="nervous.html">الجهاز العصبي</a>
                </div>
            </div>

            <a href="lab.html">مختبر دراسي</a>
            <a href="questionnaire.html" class="active">استبيان</a>
            <a href="funpage.html">لعبة الذاكرة</a>
        </div>

        <a href="index.html" class="logo-img-link">
            <img src="Logo.png" class="logo-img">
        </a>

        <div class="navbar left-nav">
            <a href="about.html">من نحن</a>
            <a href="contact.html">تواصل معنا</a>
            <a href="login.html" class="login-btn-header">تسجيل الدخول</a>
        </div>

    </div>
</div>

<div class="container">

    <h1 style="color:#00d4ff;">استبيان رأي المستخدمين</h1>
    <p style="color: var(--sub-text); margin-bottom: 30px;">
        ساعدنا في تحسين تجربة التعلم الخاصة بك
    </p>

    <div class="form-card">
        <form id="form">

            <label class="form-label-custom">الاسم الكامل *</label>
            <input type="text" id="name" class="form-control-custom">

            <label class="form-label-custom mt-3">مستوى الدراسة *</label>
            <div>
                <label class="form-check-custom"><input type="radio" name="level"> طالب طب</label>
                <label class="form-check-custom"><input type="radio" name="level"> طالب تمريض</label>
                <label class="form-check-custom"><input type="radio" name="level"> طالب ثانوي</label>
                <label class="form-check-custom"><input type="radio" name="level"> أستاذ/باحث</label>
            </div>

            <label class="form-label-custom mt-3">الأنظمة التشريحية</label>
            <div>
                <label class="form-check-custom"><input type="checkbox"> الهيكل العظمي</label>
                <label class="form-check-custom"><input type="checkbox"> الجهاز العضلي</label>
                <label class="form-check-custom"><input type="checkbox"> الجهاز الدوري</label>
                <label class="form-check-custom"><input type="checkbox"> الجهاز العصبي</label>
            </div>

            <label class="form-label-custom mt-3">تقييمك (1-10) *</label>

            <div class="range-container">
                <input type="number" id="num" class="range-value" value="5" min="1" max="10">
                
                <div class="custom-range-wrapper">
                    <div class="range-fill" id="rangeFill"></div>
                    <input type="range" id="range" min="1" max="10" value="5">
                </div>
            </div>

            <label class="form-label-custom mt-3">اقتراحاتك</label>
            <textarea class="form-control-custom" rows="3"></textarea>

            <button class="submit-btn">إرسال الاستبيان </button>

        </form>
    </div>

</div>

<div class="footer">
    <p>© 2026 Anatomy Atlas || Science Team</p>
</div>

<script>
const range = document.getElementById("range");
const num = document.getElementById("num");
const fill = document.getElementById("rangeFill");

function updateFill(value) {
    const percent = ((value - 1) / 9) * 100;
    fill.style.width = percent + "%";
}

range.addEventListener("input", () => {
    num.value = range.value;
    updateFill(range.value);
});

num.addEventListener("input", () => {
    let val = Math.max(1, Math.min(10, num.value));
    range.value = val;
    num.value = val;
    updateFill(val);
});

updateFill(range.value);
</script>

</body>
</html>
