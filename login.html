<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - Anatomy 3D</title>
    <link rel="stylesheet" href="auth-style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-card">
        <div class="form-side">
            <img src="Logo.png" class="logo" alt="Logo">
            <h1>تسجيل الدخول</h1>
            <div class="google-btn">
                <img src="logo-google-svgrepo-com.svg" alt="G">
                <span>الدخول عبر جوجل</span>
            </div>
            <p class="separator">أو سجل دخولك بحسابك</p>
            <form action="https://httpbin.org/get" method="GET">
                <input type="email" name="user_email" placeholder="البريد الإلكتروني" required>
                <input type="password" name="user_password" placeholder="كلمة المرور" required>
                <a href="#" class="forgot-pass">نسيت كلمة المرور؟</a>
                <button type="submit" class="submit-btn">دخول</button>
            </form>
        </div>
        
        <div class="image-side side-bg">
            <div class="overlay-content">
                <h2>أهلاً بعودتك!</h2>
                <p>سجل دخولك لتكمل رحلتك معنا في عالم التشريح</p>
                <a href="signin.html" class="switch-btn">إنشاء حساب</a>
            </div>
        </div>
    </div>
</body>
</html>
